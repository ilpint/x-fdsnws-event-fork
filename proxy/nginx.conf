user              nginx;
worker_processes  4;

events {
    use           epoll;
    worker_connections  1024;
    accept_mutex        on;
}


http {
    server_tokens off;
    include       mime.types;
    charset       utf-8;

    proxy_cache_path /var/cache/nginx/preview
        levels=1:2
        keys_zone=previewcache:100m
        max_size=5g
        inactive=30d
        use_temp_path=off;


    proxy_buffer_size 16k;
    proxy_buffers 16 16k;
    # header helpers for reverse proxied servers
    proxy_set_header        Host                    $host;                          # Ensures the actual hostname is sent and not 'localhost' 
    proxy_set_header        X-Real-IP               $remote_addr;                   # The Real IP of the client and not the IP of nginx proxy
    proxy_set_header        X-Forwarded-For         $proxy_add_x_forwarded_for;
    proxy_set_header        nginx-request-uri       $request_uri;                   # The original URI before proxying

    keepalive_timeout 60s 60s;

    send_timeout 15; # maximum time between packets nginx is allowed to pause when sending the client data
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

     # Enable GZip
     gzip on;
     gzip_disable "msie6";
     gzip_vary on;
     gzip_proxied any;
     gzip_comp_level 6;
     gzip_min_length 256;
     gzip_buffers 16 8k;
     gzip_http_version 1.1;
     gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript image/jpeg image/jpg application/vnd.ms-fontobject application/x-font-ttf font/opentype image/svg+xml image/x-icon;

     # Adjust output buffers
     reset_timedout_connection on;
     server_names_hash_bucket_size 100;

    upstream backend_event {
      server x-fdsn-event-1:8080;
      server x-fdsn-event-2:8080;
      server x-fdsn-event-3:8080;
      server x-fdsn-event-4:8080;
      keepalive 16;
      keepalive_requests 1000;
      #least_conn;
      ip_hash;
    }



    server {
       listen        80;
       charset utf-8;
       server_tokens off;
       client_max_body_size 120M;
       #Permit CORS requests
       add_header Access-Control-Allow-Origin *;

       root /;

       error_page    500 502 503 504  /50x.html;
       proxy_connect_timeout       120s;
        # --- Builder static (served by nginx, must win over /fdsnws/event/1/ reverse-proxy) ---

        # redirect senza slash
        location = /fdsnws/event/1/builder {
          return 301 /fdsnws/event/1/builder/;
        }

        # vendor assets: serve diretto (NO SPA fallback)
        location ^~ /fdsnws/event/1/builder/vendor/ {
          alias /var/www/event-builder/vendor/;
          expires 30d;
          add_header Cache-Control "public, max-age=2592000, immutable";
        }

        # altri asset del builder (css/js/map al root del builder)
        location ~* ^/fdsnws/event/1/builder/(.+\.(?:js|css|map|json|png|jpg|jpeg|svg|ico|woff2?|ttf))$ {
          alias /var/www/event-builder/$1;
          expires 30d;
          add_header Cache-Control "public, max-age=2592000, immutable";
        }

        # assets data (terrain/moho/manifest). Keep JSON readable from anywhere.
        location ^~ /fdsnws/event/1/builder/assets/ {
          alias /var/www/event-builder/assets/;
          expires 30d;
          add_header Cache-Control "public, max-age=2592000, immutable";
          add_header Access-Control-Allow-Origin "*" always;
          try_files $uri =404;
        }

        # swagger json spesso aggiornato
        location = /fdsnws/event/1/builder/application-Swagger20.json {
          alias /var/www/event-builder/application-Swagger20.json;
          add_header Cache-Control "no-store";
        }

        # pagina builder (SPA fallback)
        location /fdsnws/event/1/builder/ {
          alias /var/www/event-builder/;
          index index.html;
          add_header Cache-Control "no-store";
          try_files $uri $uri/ /fdsnws/event/1/builder/index.html;
        }


       location /fdsnws/event/1/ {
          #PUT and DELETE not allowed outside allow NET/MASK
          #	  limit_except GET POST {
          #          allow 10.0.0.0/8;
          #  	    deny all;
          #     	}

        # Reverse proxy rename se match url iniziale del servizio
        proxy_pass              http://backend_event/fdsnws/event/1/;
        proxy_http_version      1.1;

        #proxy_set_header       Content-Type "";
        #proxy_set_header       Connection "";

        proxy_send_timeout  600s;
        proxy_read_timeout  600s;
    }

    location / {

        # Reverse proxy rename se match url iniziale del servizio
        proxy_pass              http://backend_event/;
        proxy_set_header        Host $http_host;
        proxy_http_version      1.1;
        }

        location /fdsnws/event/1/preview/version {
          proxy_pass http://backend_event/fdsnws/event/1/preview/version;
          proxy_http_version 1.1;

          proxy_cache previewcache;
          proxy_cache_key "$scheme$host$request_uri";
          proxy_cache_lock on;

          proxy_cache_valid 200 30s;
          proxy_cache_valid 204 30s;

          proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
          proxy_cache_background_update on;

          # keep your headers
          add_header Cache-Control "no-store" always;
          add_header X-Cache-Status $upstream_cache_status always;

          # add CORS here (because add_header exists in this location)
          add_header Access-Control-Allow-Origin "*" always;
        }

        location ^~ /fdsnws/event/1/preview/year/ {
          proxy_pass http://backend_event/fdsnws/event/1/preview/year/;
          proxy_http_version 1.1;

          proxy_cache previewcache;
          proxy_cache_key "$scheme$host$request_uri";
          proxy_cache_lock on;

          proxy_cache_valid 200 30d;
          proxy_cache_valid 204 1h;

          proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
          proxy_cache_background_update on;

          add_header Cache-Control "public, max-age=2592000, immutable" always;
          add_header X-Cache-Status $upstream_cache_status always;

          # add CORS here too
          add_header Access-Control-Allow-Origin "*" always;
        }

    }



    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"'
                      ' - "$http_request_expect"';
    access_log  /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log error;
    rewrite_log on;

}
